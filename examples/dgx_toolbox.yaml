# DGX Toolbox Configuration — Sample for External Projects
#
# Copy this file to your project at: config/dgx_toolbox.yaml
# Copy dgx_toolbox.py to: scripts/dgx_toolbox.py
#
# Then use from your project:
#     from scripts.dgx_toolbox import get_toolbox
#     dgx = get_toolbox()
#     dgx.ensure_ready("training")
#     dgx.execute("training", "python", "train.py")
#
# The dgx_toolbox_path can also be overridden via DGX_TOOLBOX_PATH env var.

dgx_toolbox_path: ~/dgx-toolbox

# ── Component paths (relative to dgx_toolbox_path) ──────────────────────────
# These map friendly names to container launch scripts in dgx-toolbox.
# See dgx-toolbox/containers/, inference/, eval/, data/ for available scripts.
components:
  # Training containers
  unsloth_studio: containers/unsloth-studio.sh
  ngc_pytorch: containers/ngc-pytorch.sh

  # Inference services (sparkrun is the replacement launcher — these
  # values are intentionally command strings, not paths, because sparkrun
  # installs as a uv-managed CLI rather than a shell script in this repo).
  vllm: "sparkrun run ~/dgx-toolbox/recipes/nemotron-3-nano-4b-bf16-vllm.yaml"
  litellm: "sparkrun proxy start"

  # Evaluation
  eval_toolbox: eval/eval-toolbox.sh

  # Data processing
  data_toolbox: data/data-toolbox.sh

  # Utilities
  status: status.sh
  modelstore: modelstore.sh

# ── Ports ────────────────────────────────────────────────────────────────────
ports:
  vllm: 8000      # sparkrun workload (vLLM) — was 8020 in <= v1.4.x
  litellm: 4000   # sparkrun proxy (LiteLLM) — unchanged port
  open_webui: 12000

# ── Container mapping ───────────────────────────────────────────────────────
# Maps logical names to Docker container names and workdirs.
# The workdir is where your project gets mounted inside the container.
containers:
  training:
    container_name: unsloth-studio      # or ngc-pytorch, etc.
    component: unsloth_studio           # matches key in 'components' above
    workdir: /workspace/my-project      # where your project is mounted
    purpose: "Model training and fine-tuning"
  inference:
    container_name: vllm                # sparkrun still launches the container as "vllm" by default
    component: vllm
    workdir: null                       # sparkrun manages its own workspace
    purpose: "Model serving via sparkrun (vLLM runtime)"

# ── Extra bind mounts ───────────────────────────────────────────────────────
# These are passed to dgx-toolbox via EXTRA_MOUNTS env var.
# Format: host_path:container_path (comma-separated for multiple).
# {project_root} is replaced with the project's root directory at runtime.
extra_mounts:
  project: "{project_root}:/workspace/my-project"

# ── Pinned dependency versions ───────────────────────────────────────────────
# Ensures reproducible environments. Installed via pip inside containers.
# Remove or modify based on your project's requirements.
pinned_versions:
  transformers: "4.56.2"
  datasets: "4.3.0"

# ── Extra pip packages ──────────────────────────────────────────────────────
# Additional packages to install in containers (beyond pinned_versions).
extra_deps:
  - pyyaml
  - mlflow

# ── Validation ───────────────────────────────────────────────────────────────
# Paths checked by dgx.validate() — relative to your project root.
validation_paths:
  training_data: data/train.jsonl
  config: config/train_config.yaml

# File checked inside container to verify the project mount is working.
mount_check_file: pyproject.toml

# Python imports to verify in the container (ensures deps are installed).
required_imports:
  - torch
  - numpy
  - transformers

# ── Status artifacts ─────────────────────────────────────────────────────────
# Files/dirs checked by dgx.status_report() to track pipeline progress.
# type: "file" checks existence, type: "glob" counts matching files.
status_artifacts:
  training_data_exists:
    path: data/train.jsonl
    type: file
  model_checkpoints:
    path: outputs/checkpoints
    type: glob
    pattern: "checkpoint-*"
  model_merged:
    path: outputs/merged/config.json
    type: file
