name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' -not -path './karpathy-autoresearch/*' \
            -exec shellcheck --severity=error --exclude=SC1087 {} +

  harness-tests:
    name: Harness unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install harness
        run: |
          cd harness
          pip install -e ".[test]" --quiet
          python -m spacy download en_core_web_lg --quiet || true
      - name: Run tests
        run: python -m pytest harness/tests/ -x -q

  bash-syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all scripts parse
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 | \
            xargs -0 -I{} bash -n {} && echo "All scripts parse OK"

  secrets-scan:
    name: Secret leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          FOUND=0

          # API keys and tokens (real values, not placeholders)
          # Patterns: Kaggle KGAT_, Anthropic sk-ant-, OpenAI sk-proj-, Google AIza,
          # GitHub ghp_/gho_, AWS AKIA, HuggingFace hf_
          PATTERNS='KGAT_[A-Za-z0-9]{20,}|sk-ant-[A-Za-z0-9]{20,}|sk-proj-[A-Za-z0-9]{20,}|AIza[A-Za-z0-9_-]{30,}|ghp_[A-Za-z0-9]{36,}|gho_[A-Za-z0-9]{36,}|AKIA[A-Z0-9]{16}|hf_[A-Za-z0-9]{20,}'

          # Search tracked files (exclude .git, .planning, binary files)
          HITS=$(grep -rEn "$PATTERNS" \
            --include='*.sh' --include='*.py' --include='*.yaml' --include='*.yml' \
            --include='*.json' --include='*.toml' --include='*.md' --include='*.txt' \
            . 2>/dev/null \
            | grep -v '\.git/' \
            | grep -v '\.planning/' \
            | grep -v 'YOUR_' \
            | grep -v 'your_key' \
            | grep -v 'sk-ant-\.\.\.' \
            | grep -v 'example\.com' \
            || true)

          if [ -n "$HITS" ]; then
            echo "::error::Potential secrets found in tracked files:"
            echo "$HITS"
            FOUND=1
          fi

          # Check .env files aren't tracked
          ENV_FILES=$(git ls-files '*.env' '.env*' '**/.env' 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::.env files should not be tracked:"
            echo "$ENV_FILES"
            FOUND=1
          fi

          # Check kaggle.json isn't tracked
          KAGGLE=$(git ls-files '*kaggle.json' 2>/dev/null || true)
          if [ -n "$KAGGLE" ]; then
            echo "::error::kaggle.json should not be tracked"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "FAILED: Secrets detected. Remove them before pushing."
            exit 1
          fi

          echo "No secrets found. OK."

  vulnerability-scan:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pip-audit
        run: pip install pip-audit --quiet
      - name: Install harness dependencies
        run: |
          cd harness
          pip install -e . --quiet 2>/dev/null || true
      - name: Audit for high/critical vulnerabilities
        run: |
          # Run pip-audit in JSON mode, then filter for high/critical
          pip-audit --format json --desc 2>/dev/null > /tmp/audit.json || true
          python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/audit.json'))
          except Exception:
              print('No audit data (install may have failed). Skipping.')
              sys.exit(0)
          vulns = data.get('vulnerabilities', [])
          severe = [v for v in vulns if v.get('fix_versions') and
                    any(a.get('severity', '').upper() in ('HIGH', 'CRITICAL')
                        for a in v.get('aliases', [{}]))]
          # Also flag any vuln with a CVE (conservative — pip-audit doesn't always have severity)
          all_vulns = [v for v in vulns if v.get('fix_versions')]
          if all_vulns:
              print(f'Found {len(all_vulns)} fixable vulnerability(ies):')
              for v in all_vulns:
                  print(f'  {v[\"name\"]} {v[\"version\"]} -> {v[\"fix_versions\"]}')
                  print(f'    {v.get(\"description\", \"\")[:120]}')
              print()
              print('Run: pip-audit --fix --dry-run')
              sys.exit(1)
          print('No fixable vulnerabilities found. OK.')
          "
