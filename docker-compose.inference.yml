# Inference stack (GUI only): Open-WebUI
#
# Model serving and the OpenAI-compatible proxy are now handled by sparkrun
# (https://github.com/spark-arena/sparkrun), invoked directly on the host.
# See example.bash_aliases (`inference-up` / `inference-down`) and the
# project README for the full workflow.
#
# Quick start:
#   docker compose -f docker-compose.inference.yml up -d     # Open-WebUI only
#   sparkrun proxy start                                     # LiteLLM on :4000
#   sparkrun run <recipe>                                    # start a model
#
# Stop:
#   sparkrun proxy stop
#   docker compose -f docker-compose.inference.yml down
#
# Ollama runs as a systemd service on the host.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open-webui
    ports:
      - "0.0.0.0:12000:8080"
    volumes:
      - open-webui:/app/backend/data
      - open-webui-ollama:/root/.ollama
    environment:
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  open-webui:
    external: true
  open-webui-ollama:
    external: true
