# Inference stack: Open-WebUI + LiteLLM + vLLM
# Ollama runs as a systemd service on the host
#
# Usage:
#   docker compose -f docker-compose.inference.yml up -d
#   docker compose -f docker-compose.inference.yml down
#   docker compose -f docker-compose.inference.yml logs -f
#
# Prerequisites:
#   - ~/.vllm-model must exist with model name
#   - ~/.litellm/config.yaml must exist (run setup-litellm-config.sh)

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open-webui
    ports:
      - "0.0.0.0:12000:8080"
    volumes:
      - open-webui:/app/backend/data
      - open-webui-ollama:/root/.ollama
    environment:
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "0.0.0.0:4000:4000"
    volumes:
      - ${HOME}/.litellm/config.yaml:/app/config.yaml:ro
    env_file:
      - path: ${HOME}/.litellm/.env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --config /app/config.yaml --host 0.0.0.0 --port 4000
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "0.0.0.0:8020:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/eval/models:/models
    ipc: host
    command: --model ${VLLM_MODEL:-nvidia/Llama-3.1-Nemotron-Nano-8B-v1} --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - with-vllm

volumes:
  open-webui:
    external: true
  open-webui-ollama:
    external: true
